name: "Build Totem"
on: [workflow_dispatch]
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["xiao_ble//zmk"]'
      shield: '["totem_left", "totem_right"]'
      kconfig: '["CONFIG_ZMK_SLEEP=y"]'
      clipboard: '["mac"]'
      alphas: '["QWERTY"]'
      nav: '["invertedT"]'
      layers: '["flip"]'
